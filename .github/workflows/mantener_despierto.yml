name: Mantener Streamlit Activo

on:
  schedule:
    # Se ejecuta cada 6 horas (minuto 0 de las horas 0, 6, 12, 18)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente para probar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar petición a la Web
        run: curl -L --max-redirs 5 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" https://ingeniero-civil-web-apps-home-xtt9fb.streamlit.app/
